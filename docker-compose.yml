services:
  mail-store-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mail
      POSTGRES_USER: mail
      POSTGRES_PASSWORD: ${MAIL_DB_PASSWORD:-changeme}
    volumes:
      - mail-store-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mail -d mail"]
      interval: 10s
      timeout: 5s
      retries: 5

  mail-store:
    build: ./mail-store
    restart: unless-stopped
    depends_on:
      mail-store-db:
        condition: service_healthy
    environment:
      DB_URL: postgres://mail:${MAIL_DB_PASSWORD:-changeme}@mail-store-db:5432/mail
      INGEST_SECRET: ${INGEST_SECRET}
      VIEWER_SECRET: ${VIEWER_SECRET}
      PORT: 3025
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3025/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Published to localhost only — Caddy reverse-proxies mail-ingest.tinytrashlabs.com
    # → 127.0.0.1:3025 with Authorization: Bearer ${INGEST_SECRET} auth guard.
    # The CF email worker sends the same secret in every ingest request.
    ports:
      - "127.0.0.1:3025:3025"

  mail-viewer:
    build: ./mail-viewer
    restart: unless-stopped
    depends_on:
      mail-store:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      MM_OAUTH_BASE_URL: ${MM_OAUTH_BASE_URL}
      MM_OAUTH_CLIENT_ID: ${MM_OAUTH_CLIENT_ID}
      MM_OAUTH_CLIENT_SECRET: ${MM_OAUTH_CLIENT_SECRET}
      MAIL_STORE_URL: http://mail-store:3025
      VIEWER_SECRET: ${VIEWER_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_DOMAIN: ${RESEND_FROM_DOMAIN:-tinytrashlabs.com}
    # AI features (summarize, draft assist, smart search) authenticate via the
    # shared Claude OAuth credentials volume the personas stack uses. The viewer
    # runs as user `nextjs` (uid 1001), so we mount the volume at that user's
    # ~/.claude — @anthropic-ai/claude-agent-sdk's query() resolves credentials
    # from os.homedir()/.claude/.credentials.json, no API key needed.
    # Mounted RW (not RO) because the agent SDK refreshes the OAuth token
    # in-place and would silently fail otherwise. The personas stack mounts
    # this same volume RW; this just matches that contract.
    volumes:
      - claude-creds:/home/nextjs/.claude
    ports:
      - "3026:3000"

volumes:
  mail-store-db-data:
  # External: provisioned and refreshed by the claude-personas-server compose
  # stack. We mount it read-only so the viewer can authenticate AI calls
  # without owning the credential lifecycle.
  claude-creds:
    external: true
    name: claude-personas-server_claude-creds
