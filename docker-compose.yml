services:
  mail-store-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mail
      POSTGRES_USER: mail
      POSTGRES_PASSWORD: ${MAIL_DB_PASSWORD:-changeme}
    volumes:
      - mail-store-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mail -d mail"]
      interval: 10s
      timeout: 5s
      retries: 5

  mail-store:
    build: ./mail-store
    restart: unless-stopped
    depends_on:
      mail-store-db:
        condition: service_healthy
    environment:
      DB_URL: postgres://mail:${MAIL_DB_PASSWORD:-changeme}@mail-store-db:5432/mail
      INGEST_SECRET: ${INGEST_SECRET}
      VIEWER_SECRET: ${VIEWER_SECRET}
      PORT: 3025
      # New-mail MM notifications — all optional; skipped silently if absent
      MM_BASE_URL: ${MM_BASE_URL:-}
      MM_BOT_TOKEN: ${MM_BOT_TOKEN:-}
      MAIL_VIEWER_URL: ${MAIL_VIEWER_URL:-https://mail.tinytrashlabs.com}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3025/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Published to localhost only — Caddy reverse-proxies mail-ingest.tinytrashlabs.com
    # → 127.0.0.1:3025 with Authorization: Bearer ${INGEST_SECRET} auth guard.
    # The CF email worker sends the same secret in every ingest request.
    ports:
      - "127.0.0.1:3025:3025"
    networks:
      default:
        aliases:
          - mail-store

  mail-viewer:
    build: ./mail-viewer
    restart: unless-stopped
    depends_on:
      mail-store:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      MM_OAUTH_BASE_URL: ${MM_OAUTH_BASE_URL}
      MM_OAUTH_CLIENT_ID: ${MM_OAUTH_CLIENT_ID}
      MM_OAUTH_CLIENT_SECRET: ${MM_OAUTH_CLIENT_SECRET}
      MAIL_STORE_URL: http://mail-store:3025
      VIEWER_SECRET: ${VIEWER_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_DOMAIN: ${RESEND_FROM_DOMAIN:-tinytrashlabs.com}
      # Avatar upload directory — persisted across deployments
      AVATAR_DIR: /data/avatars
      # The claude-creds volume is written by the personas stack running as user
      # `node` (uid 1000), so credentials live at /home/node/.claude/.credentials.json
      # inside the volume. The Claude binary resolves creds from $HOME/.claude, so
      # we override HOME here to match — otherwise the binary sees an empty file at
      # /home/nextjs/.claude/.credentials.json and returns "Not logged in".
      HOME: /home/node
    # AI features authenticate via the shared Claude OAuth credentials volume.
    # Volume mount path updated to match HOME so the binary finds the credentials.
    # Mounted RW because the agent SDK refreshes the OAuth token in-place.
    volumes:
      - claude-creds:/home/node/.claude
      - mail-viewer-data:/data
    ports:
      - "3026:3000"

volumes:
  mail-store-db-data:
  mail-viewer-data:
  # External: provisioned by the claude-personas-server compose stack.
  # Mounted RW into the viewer because @anthropic-ai/claude-agent-sdk refreshes
  # the OAuth token in-place; a RO mount would silently fail when the token
  # rotates. Personas stack mounts this same volume RW for the same reason —
  # token refresh is cooperative, last writer wins on rotation.
  claude-creds:
    external: true
    name: claude-personas-server_claude-creds
